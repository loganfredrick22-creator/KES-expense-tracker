<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dishi — Personal Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00A651',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Dishi</h1>
            <p class="text-gray-600">Track every shilling. Own your finances.</p>
        </header>

        <!-- Over Budget Alert -->
        <div id="over-budget-alert" class="hidden mb-6 bg-red-50 border border-red-200 rounded-lg p-4">
            <p class="text-red-700 font-medium">You have exceeded your monthly budget. Review your spending.</p>
        </div>

        <!-- Summary Dashboard -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-50 rounded-lg p-4">
                <p class="text-sm text-gray-600 mb-1">Total Spent</p>
                <p id="total-spent" class="text-xl font-bold text-gray-900">KSh 0.00</p>
            </div>
            <div class="bg-gray-50 rounded-lg p-4">
                <p class="text-sm text-gray-600 mb-1">Budget Remaining</p>
                <p id="budget-remaining" class="text-xl font-bold text-gray-900">KSh 30,000.00</p>
            </div>
            <div class="bg-gray-50 rounded-lg p-4">
                <p class="text-sm text-gray-600 mb-1">Expenses This Month</p>
                <p id="expense-count" class="text-xl font-bold text-gray-900">0</p>
            </div>
            <div class="bg-gray-50 rounded-lg p-4">
                <p class="text-sm text-gray-600 mb-1">Top Category</p>
                <p id="top-category" class="text-xl font-bold text-gray-900">—</p>
            </div>
        </div>

        <!-- Budget Section -->
        <div class="bg-gray-50 rounded-lg p-4 mb-8">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
                <label for="monthly-budget" class="text-sm font-medium text-gray-700 mb-2 md:mb-0">Monthly Budget (KSh)</label>
                <input type="number" id="monthly-budget" value="30000" min="0" max="10000000" 
                    class="w-full md:w-48 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div id="budget-progress" class="bg-primary h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="budget-percentage" class="text-sm text-gray-600 mt-2">0% of budget used</p>
        </div>

        <!-- Add Expense Form -->
        <div class="bg-white border border-gray-200 rounded-lg p-6 mb-8">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">Add New Expense</h2>
            <form id="expense-form" class="space-y-4">
                <div>
                    <label for="expense-description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <input type="text" id="expense-description" placeholder="e.g., Lunch at Kenchic"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                    <span id="error-description" class="text-red-500 text-xs hidden"></span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="expense-amount" class="block text-sm font-medium text-gray-700 mb-1">Amount (KSh)</label>
                        <input type="number" id="expense-amount" placeholder="0.00" min="0" max="1000000" step="0.01"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                        <span id="error-amount" class="text-red-500 text-xs hidden"></span>
                    </div>
                    <div>
                        <label for="expense-category" class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <select id="expense-category" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                            <option value="">Select category</option>
                            <option value="food">Food and Drinks</option>
                            <option value="transport">Transport</option>
                            <option value="housing">Rent and Housing</option>
                            <option value="airtime">Airtime and Data</option>
                            <option value="health">Health and Medical</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="education">Education</option>
                            <option value="other">Other</option>
                        </select>
                        <span id="error-category" class="text-red-500 text-xs hidden"></span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="expense-date" class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                        <input type="date" id="expense-date"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                        <span id="error-date" class="text-red-500 text-xs hidden"></span>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Payment Method</label>
                        <div class="flex gap-4">
                            <label class="flex items-center">
                                <input type="radio" name="expense-payment" value="mpesa" class="mr-2 text-primary focus:ring-primary">
                                <span class="text-sm text-gray-700">M-Pesa</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="expense-payment" value="cash" class="mr-2 text-primary focus:ring-primary">
                                <span class="text-sm text-gray-700">Cash</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="expense-payment" value="card" class="mr-2 text-primary focus:ring-primary">
                                <span class="text-sm text-gray-700">Card</span>
                            </label>
                        </div>
                        <span id="error-payment" class="text-red-500 text-xs hidden"></span>
                    </div>
                </div>
                <button type="submit" id="btn-add-expense" 
                    class="w-full bg-primary text-white font-medium py-2 px-4 rounded-lg hover:bg-green-700 transition-colors">
                    Add Expense
                </button>
            </form>
        </div>

        <!-- Filters and Search -->
        <div class="bg-white border border-gray-200 rounded-lg p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label for="filter-category" class="block text-sm font-medium text-gray-700 mb-1">Filter by Category</label>
                    <select id="filter-category" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                        <option value="">All Categories</option>
                        <option value="food">Food and Drinks</option>
                        <option value="transport">Transport</option>
                        <option value="housing">Rent and Housing</option>
                        <option value="airtime">Airtime and Data</option>
                        <option value="health">Health and Medical</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="education">Education</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label for="filter-payment" class="block text-sm font-medium text-gray-700 mb-1">Filter by Payment</label>
                    <select id="filter-payment" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                        <option value="">All Methods</option>
                        <option value="mpesa">M-Pesa</option>
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                    </select>
                </div>
                <div>
                    <label for="search-input" class="block text-sm font-medium text-gray-700 mb-1">Search</label>
                    <input type="text" id="search-input" placeholder="Search description..."
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                </div>
                <div>
                    <label for="sort-select" class="block text-sm font-medium text-gray-700 mb-1">Sort By</label>
                    <select id="sort-select" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                        <option value="newest">Newest</option>
                        <option value="oldest">Oldest</option>
                        <option value="highest">Highest Amount</option>
                        <option value="lowest">Lowest Amount</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Export Button -->
        <div class="mb-6">
            <button id="btn-export-csv" 
                class="bg-gray-800 text-white font-medium py-2 px-4 rounded-lg hover:bg-gray-700 transition-colors">
                Export to CSV
            </button>
        </div>

        <!-- Expense List -->
        <div id="expense-list" class="space-y-4">
            <p class="text-gray-500 text-center py-8">No expenses yet. Start tracking today.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
